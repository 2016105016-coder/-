name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make Gradle executable
        run: chmod +x gradlew
        working-directory: alias_obshestvoznanie_10

      - name: Build APK
        run: ./gradlew assembleDebug
        working-directory: alias_obshestvoznanie_10

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: alias_obshestvoznanie_10/app/build/outputs/apk/debug/*.apk
